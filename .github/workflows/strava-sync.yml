name: Strava sync

on:
  schedule:
    # Hourly at :07 (offset avoids the top-of-hour cron congestion on GitHub).
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: read

# Never run two syncs at once; dedupe makes overlap harmless, but skip anyway.
concurrency:
  group: strava-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Strava runs
        run: npx tsx scripts/strava/sync.ts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          CORNERMAN_UID: ${{ secrets.CORNERMAN_UID }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
